<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Producto | Aksha Living</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Estilos rápidos para que los botones se vean bien juntos */
        .detail-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }
        .qty-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        /* Botón secundario para finalizar pedido */
        .btn-finalizar {
            background-color: transparent;
            border: 1px solid #000;
            color: #000;
            padding: 15px;
            cursor: pointer;
            letter-spacing: 2px;
            font-size: 0.8rem;
            display: none; /* Se activa con JS */
            transition: all 0.3s ease;
        }
        .btn-finalizar:hover {
            background-color: #000;
            color: #fff;
        }
        #cart-counter {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="container">
            <div class="nav-content">
                <a href="../index.html" class="logo">AKSHA</a>
                <ul class="nav-links">
                    <li><a href="../index.html" class="nav-link">Inicio</a></li>
                    <li><a href="../catalogo.html" class="nav-link active">Catálogo</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="detail-grid">
            <div class="detail-image">
                <img id="product-img" src="" alt="">
            </div>
            <div class="detail-info">
                <p class="detail-breadcrumb">CATÁLOGO / VELAS SAGRADAS</p>
                <h1 id="product-title"></h1>
                <p id="product-scent" class="detail-scent"></p>
                <p id="product-price" class="detail-price"></p>
                
                <div class="detail-actions">
                    <div class="qty-container">
                        <label for="qty">CANTIDAD:</label>
                        <input type="number" id="qty" value="1" min="1" class="qty-input">
                    </div>
                    
                    <div class="btn-group">
                        <button id="add-to-cart" class="add-to-cart-btn">AGREGAR AL RITUAL</button>
                        
                        <button id="btn-finalizar" class="btn-finalizar" onclick="enviarPedidoWhatsApp()">
                            FINALIZAR PEDIDO (WHATSAPP)
                        </button>
                    </div>
                    
                    <div id="cart-counter"></div>
                </div>

                <div class="detail-description">
                    <h3>DETALLES</h3>
                    <p id="product-desc"></p>
                </div>
            </div>
        </section>
    </main>

    <script src="../js/main.js"></script>
    <script>
        // Al cargar, inicializamos los datos y los eventos de los botones
        window.onload = () => {
            cargarDetalle(); // Esta función vive en main.js
            
            // Asignamos el evento al botón de agregar
            const btnAdd = document.getElementById('add-to-cart');
            if(btnAdd) {
                btnAdd.onclick = agregarAlCarritoLocal;
            }
            
            // Revisamos si ya hay algo en el carrito para mostrar el botón de finalizar
            actualizarEstadoCarrito();
        };
    </script>
</body>
</html>
